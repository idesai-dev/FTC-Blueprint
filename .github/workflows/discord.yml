name: Discord Notification

on:
  push:

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Send detailed message to Discord
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"🚀 New push to repo **${{ github.repository }}**\n**Branch:** ${{ github.ref_name }}\n**Author:** ${{ github.event.head_commit.author.name }}\n**Message:** ${{ github.event.head_commit.message }}\n**Commit:** ${{ github.event.head_commit.url }}\n**Time:** ${{ github.event.head_commit.timestamp }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}

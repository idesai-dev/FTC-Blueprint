<!doctype html>
<html lang="en" class="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#1a1a1a" />
		
		<!-- SEO / Search Console Verification -->
		<!-- Paste your Google Search Console verification code below -->
		<!-- <meta name="google-site-verification" content="YOUR_VERIFICATION_CODE_HERE" /> -->
		
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.14/dist/katex.min.css" integrity="sha384-CW0wYy1242w3vjKNC1iQf4G+hGfX25yA9gM5hX/Fm1T212kZ6oK/Z4iR8/W3H0vM" crossorigin="anonymous">
		<script>
			(function () {
				const saved = localStorage.getItem('theme');
				const theme = saved || 'light';
				document.documentElement.className = theme;
			})();
		</script>

		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.svg" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
	</body>
</html>
